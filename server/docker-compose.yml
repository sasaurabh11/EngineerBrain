services:
  rabbitmq:
    image: rabbitmq:4-management
    container_name: engineerbrain-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: engineerbrain
      RABBITMQ_DEFAULT_PASS: engineerbrain
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  qdrant:
    image: qdrant/qdrant:latest
    container_name: engineerbrain-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  rabbitmq_data:
  qdrant_data:
